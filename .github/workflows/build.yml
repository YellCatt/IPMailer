name: Build for Multiple Platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-mips:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mipsel-linux-gnu libc6-dev-mipsel-cross libgcc-12-dev-mipsel-cross linux-libc-dev-mipsel-cross libc6-mipsel-cross

    - name: Install Nim
      uses: jiro4989/setup-nim-action@v1
      with:
        nim-version: '2.0.x'

    - name: Install dependencies
      run: |
        nimble install https://github.com/nim-lang/smtp -y

    - name: Build for MIPS router
      run: |
        nim c --cpu:mipsel --os:linux \
            --cc:gcc \
            --gcc.exe:mipsel-linux-gnu-gcc \
            --gcc.linkerexe:mipsel-linux-gnu-gcc \
            --passC:"-O2 -static -EL" \
            --passL:"-static" \
            -d:release \
            -d:ssl \
            -o:ipmailer_mipsel \
            send_news.nim

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ipmailer_mipsel
        path: ipmailer_mipsel

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install OpenSSL (Windows)
      run: |
        choco install openssl --version=1.1.1w -y
        echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-win64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "PATH=C:\Program Files\OpenSSL-win64\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Nim
      uses: jiro4989/setup-nim-action@v1
      with:
        nim-version: '2.0.x'

    - name: Install dependencies
      run: |
        nimble install https://github.com/nim-lang/smtp -y

    - name: Build for Windows
      run: |
        nim c --cpu:amd64 --os:windows \
            -d:release \
            -d:ssl \
            --passL:"-LC:\Program Files\OpenSSL-win64\lib" \
            --passL:"-llibssl" \
            --passL:"-llibcrypto" \
            -o:ipmailer_windows.exe \
            send_news.nim

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ipmailer_windows
        path: ipmailer_windows.exe

  release:
    needs: [build-mips, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create or Update Dev Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="dev-latest"
          echo "使用固定版本tag: $VERSION"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          gh release create "$VERSION" \
            --title "Development Build (Latest)" \
            --notes "Automatic build from commit ${{ github.sha }}%0A%0A**Platforms:**%0A- Linux mipsle (极路由2 - 静态编译)%0A- Windows amd64" \
            --prerelease \
            artifacts/*