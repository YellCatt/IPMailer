name: Build for Multiple Platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-mips:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'

    - name: Build for MIPS router
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=mipsle go build -ldflags="-s -w" -o ipmailer_mipsel .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ipmailer_mipsel
        path: ipmailer_mipsel

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'

    - name: Build for Windows
      run: |
        go build -ldflags="-s -w" -o ipmailer_windows.exe .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ipmailer_windows
        path: ipmailer_windows.exe

  release:
    needs: [build-mips, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create or Update Dev Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="dev-latest"
          echo "使用固定版本tag: $VERSION"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          gh release create "$VERSION" \
            --title "Development Build (Latest)" \
            --notes "Automatic build from commit ${{ github.sha }}%0A%0A**Platforms:**%0A- Linux mipsle (极路由2 - 静态编译)%0A- Windows amd64" \
            --prerelease \
            artifacts/*